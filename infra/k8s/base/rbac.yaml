apiVersion: v1
kind: ServiceAccount
metadata:
  name: runner-provisioner
  namespace: veridian-control
  labels:
    app.kubernetes.io/part-of: veridian-cde
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: runner-provisioner
  namespace: veridian-runners
  labels:
    app.kubernetes.io/part-of: veridian-cde
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log", "pods/status"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runner-provisioner
  namespace: veridian-runners
  labels:
    app.kubernetes.io/part-of: veridian-cde
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: runner-provisioner
subjects:
  - kind: ServiceAccount
    name: runner-provisioner
    namespace: veridian-control

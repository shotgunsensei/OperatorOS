apiVersion: apps/v1
kind: Deployment
metadata:
  name: veridian-runner-gateway
  namespace: veridian-cde
  labels:
    app: veridian-runner-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: veridian-runner-gateway
  template:
    metadata:
      labels:
        app: veridian-runner-gateway
    spec:
      containers:
        - name: runner-gateway
          image: veridian-cde/runner-gateway:latest
          ports:
            - containerPort: 4001
          env:
            - name: GATEWAY_PORT
              value: "4001"
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: veridian-runner-gateway
  namespace: veridian-cde
spec:
  selector:
    app: veridian-runner-gateway
  ports:
    - port: 80
      targetPort: 4001
  type: ClusterIP

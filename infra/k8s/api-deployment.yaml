apiVersion: apps/v1
kind: Deployment
metadata:
  name: veridian-api
  namespace: veridian-cde
  labels:
    app: veridian-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: veridian-api
  template:
    metadata:
      labels:
        app: veridian-api
    spec:
      containers:
        - name: api
          image: veridian-cde/api:latest
          ports:
            - containerPort: 4000
          env:
            - name: API_PORT
              value: "4000"
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: veridian-api
  namespace: veridian-cde
spec:
  selector:
    app: veridian-api
  ports:
    - port: 80
      targetPort: 4000
  type: ClusterIP

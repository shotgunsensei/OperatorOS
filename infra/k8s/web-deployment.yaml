apiVersion: apps/v1
kind: Deployment
metadata:
  name: veridian-web
  namespace: veridian-cde
  labels:
    app: veridian-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: veridian-web
  template:
    metadata:
      labels:
        app: veridian-web
    spec:
      containers:
        - name: web
          image: veridian-cde/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: veridian-web
  namespace: veridian-cde
spec:
  selector:
    app: veridian-web
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
